<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manthan — Deterministic Decision Infrastructure</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --text: #0a0a0a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg-soft: #fafafa;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: var(--text);
    }

    /* NAV */
    .nav {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .nav-inner {
      max-width: 1000px;
      margin: auto;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo a {
      font-weight: 600;
      text-decoration: none;
      color: var(--text);
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
      color: var(--muted);
    }

    .nav-links a:hover {
      color: var(--text);
    }

    /* LAYOUT */
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 100px 20px;
    }

    section {
      margin-bottom: 120px;
    }

    .label {
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }

    .gradient {
      background: linear-gradient(90deg, #000, #555);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 18px;
      color: var(--muted);
      max-width: 600px;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      margin-right: 10px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      background: #fff;
    }

    .btn:hover {
      background: var(--bg-soft);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .card {
      padding: 20px 0;
      border-top: 1px solid var(--border);
    }

    .pipeline {
      margin-top: 30px;
      display: grid;
      gap: 16px;
    }

    .step {
      padding: 14px 0;
      border-top: 1px solid var(--border);
    }

    pre {
      margin-top: 20px;
      padding: 16px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
    }

    /* ================= MOBILE ================= */

    @media (max-width: 768px) {

      .nav-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .nav-links a {
        margin-left: 0;
      }

      .container {
        padding: 60px 16px;
      }

      h1 {
        font-size: 36px;
      }

      p {
        font-size: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }

  </style>
</head>

<body>

  <div class="nav">
    <div class="nav-inner">
      <div class="logo"><a href="./index.html">Manthan</a></div>
      <div class="nav-links">
        <a href="#pipeline">Pipeline</a>
        <a href="./docs/index.html">Docs</a>
        <a href="./team/index.html">Team</a>
      </div>
    </div>
  </div>

  <div class="container">

    <section>
      <h1 class="gradient">Deterministic<br/>decision infrastructure.</h1>
      <p>Same input. Same output. Always.</p>

      <div class="buttons">
        <a href="#pipeline" class="btn">How it works</a>
        <a href="./docs/index.html" class="btn">Docs</a>
        <a href="./team/index.html" class="btn">Team</a>
      </div>
    </section>

    <section id="pipeline">
      <div class="label">PIPELINE</div>
      <div class="pipeline">
        <div class="step">Validation → INVALID</div>
        <div class="step">Completeness → INCOMPLETE</div>
        <div class="step">Evaluation → ALLOW / BLOCK</div>
        <div class="step">Explanation → TRACE</div>
      </div>
    </section>

  </div>

  <footer>Manthan — deterministic decision infrastructure</footer>

</body>
</html>
